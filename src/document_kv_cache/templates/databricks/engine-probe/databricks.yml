bundle:
  name: document-kv-engine-probe

variables:
  runner_python_file:
    description: Cluster-visible Python runner script URI for the native engine-probe task.
  handoff_json:
    description: Cluster-visible document_kv.engine_adapter_request.v1 schema v2 handoff JSON path or URI.
  probe_factory:
    description: Dotted native probe factory, such as my_engine_adapter.probes:build_probe.
  probe_output_json:
    description: Cluster-visible output path for the native engine-probe evidence JSON.
  actions_output_json:
    description: Cluster-visible output path for the connector actions descriptor JSON.
  payload_uri:
    description: Cluster-visible materialized KV payload URI referenced by this handoff.
  expected_backend:
    description: Serving backend expected by the probe, either vllm or sglang.
  vllm_native_probe_delegate_factory:
    default: ""
    description: Optional backend-native delegate factory for Cachet's built-in vLLM probe factory.
  sglang_native_probe_delegate_factory:
    default: ""
    description: Optional backend-native delegate factory for Cachet's built-in SGLang probe factory.
  wheel_uri:
    description: Cluster-supported document-kv-cache wheel URI, such as a UC Volume or workspace file path.
  node_type_id:
    default: g5.4xlarge
    description: AWS g5 node type for the single-node GPU engine probe.
  spark_version:
    default: 15.4.x-gpu-ml-scala2.12
    description: Databricks GPU ML runtime version.
  single_user_name:
    default: ${workspace.current_user.userName}
    description: Databricks user or service principal for SINGLE_USER cluster access.

resources:
  jobs:
    document_kv_engine_probe:
      name: document-kv-engine-probe
      tasks:
        - task_key: document_kv_engine_probe
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            driver_node_type_id: ${var.node_type_id}
            data_security_mode: SINGLE_USER
            single_user_name: ${var.single_user_name}
            num_workers: 0
            spark_conf:
              spark.master: local[*]
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode
              purpose: document-kv-engine-probe
            spark_env_vars:
              DOCUMENT_KV_VLLM_NATIVE_PROBE_FACTORY: ${var.vllm_native_probe_delegate_factory}
              DOCUMENT_KV_SGLANG_NATIVE_PROBE_FACTORY: ${var.sglang_native_probe_delegate_factory}
            aws_attributes:
              availability: ON_DEMAND
              zone_id: auto
          spark_python_task:
            python_file: ${var.runner_python_file}
            parameters:
              - --handoff-json
              - ${var.handoff_json}
              - --probe-factory
              - ${var.probe_factory}
              - --output-json
              - ${var.probe_output_json}
              - --actions-output-json
              - ${var.actions_output_json}
              - --payload-uri
              - ${var.payload_uri}
              - --expected-backend
              - ${var.expected_backend}
              - --package-wheel-uri
              - ${var.wheel_uri}
