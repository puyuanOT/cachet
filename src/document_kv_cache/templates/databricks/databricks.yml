bundle:
  name: document-kv-cache-v1

variables:
  plan_json_uri:
    description: Cluster-visible benchmark plan JSON URI.
  runner_python_file:
    description: Cluster-visible Python runner script URI.
  wheel_uri:
    description: Cluster-supported document-kv-cache wheel URI, such as a UC Volume or workspace file path.
  execution_result_json_uri:
    description: Cluster-visible path for the benchmark execution result JSON.
  vllm_native_probe_delegate_factory:
    default: ""
    description: Optional backend-native delegate factory for benchmark plans that run Cachet's built-in vLLM probe.
  sglang_native_probe_delegate_factory:
    default: ""
    description: Optional backend-native delegate factory for benchmark plans that run Cachet's built-in SGLang probe.
  transformers_model_id:
    default: ""
    description: Optional non-secret CACHET_TRANSFORMERS_MODEL_ID runtime value for Transformers KV generation.
  transformers_tokenizer_id:
    default: ""
    description: Optional non-secret CACHET_TRANSFORMERS_TOKENIZER_ID runtime value for Transformers KV generation.
  transformers_device:
    default: ""
    description: Optional non-secret CACHET_TRANSFORMERS_DEVICE runtime value for Transformers KV generation.
  transformers_torch_dtype:
    default: ""
    description: Optional non-secret CACHET_TRANSFORMERS_TORCH_DTYPE runtime value for Transformers KV generation.
  transformers_trust_remote_code:
    default: ""
    description: Optional non-secret CACHET_TRANSFORMERS_TRUST_REMOTE_CODE runtime value for Transformers KV generation.
  transformers_add_special_tokens:
    default: ""
    description: Optional non-secret CACHET_TRANSFORMERS_ADD_SPECIAL_TOKENS runtime value for Transformers KV generation.
  transformers_cache_axis_order:
    default: ""
    description: Optional non-secret CACHET_TRANSFORMERS_CACHE_AXIS_ORDER runtime value for Transformers KV generation.
  node_type_id:
    default: g6.8xlarge
    description: AWS g5/g6 node type for the single-node GPU benchmark.
  spark_version:
    default: 15.4.x-gpu-ml-scala2.12
    description: Databricks GPU ML runtime version.
  single_user_name:
    default: ${workspace.current_user.userName}
    description: Databricks user or service principal for SINGLE_USER cluster access.

resources:
  jobs:
    document_kv_v1_benchmark:
      name: document-kv-v1-benchmark
      tasks:
        - task_key: document_kv_v1_benchmark
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            driver_node_type_id: ${var.node_type_id}
            data_security_mode: SINGLE_USER
            single_user_name: ${var.single_user_name}
            num_workers: 0
            spark_conf:
              spark.master: local[*]
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode
              purpose: document-kv-v1-benchmark
            spark_env_vars:
              DOCUMENT_KV_VLLM_NATIVE_PROBE_FACTORY: ${var.vllm_native_probe_delegate_factory}
              DOCUMENT_KV_SGLANG_NATIVE_PROBE_FACTORY: ${var.sglang_native_probe_delegate_factory}
              CACHET_TRANSFORMERS_MODEL_ID: ${var.transformers_model_id}
              CACHET_TRANSFORMERS_TOKENIZER_ID: ${var.transformers_tokenizer_id}
              CACHET_TRANSFORMERS_DEVICE: ${var.transformers_device}
              CACHET_TRANSFORMERS_TORCH_DTYPE: ${var.transformers_torch_dtype}
              CACHET_TRANSFORMERS_TRUST_REMOTE_CODE: ${var.transformers_trust_remote_code}
              CACHET_TRANSFORMERS_ADD_SPECIAL_TOKENS: ${var.transformers_add_special_tokens}
              CACHET_TRANSFORMERS_CACHE_AXIS_ORDER: ${var.transformers_cache_axis_order}
            aws_attributes:
              availability: ON_DEMAND
              zone_id: auto
          spark_python_task:
            python_file: ${var.runner_python_file}
            parameters:
              - --plan-json
              - ${var.plan_json_uri}
              - --result-json
              - ${var.execution_result_json_uri}
              - --package-wheel-uri
              - ${var.wheel_uri}
