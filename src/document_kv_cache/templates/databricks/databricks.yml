bundle:
  name: document-kv-cache-v1

variables:
  plan_json_uri:
    description: Cluster-visible benchmark plan JSON URI.
  runner_python_file:
    description: Cluster-visible Python runner script URI.
  wheel_uri:
    description: Cluster-supported document-kv-cache wheel URI, such as a UC Volume or workspace file path.
  execution_result_json_uri:
    description: Cluster-visible path for the benchmark execution result JSON.
  vllm_native_probe_delegate_factory:
    default: ""
    description: Optional backend-native delegate factory for benchmark plans that run Cachet's built-in vLLM probe.
  sglang_native_probe_delegate_factory:
    default: ""
    description: Optional backend-native delegate factory for benchmark plans that run Cachet's built-in SGLang probe.
  node_type_id:
    default: g5.4xlarge
    description: AWS g5 node type for the single-node GPU benchmark.
  spark_version:
    default: 15.4.x-gpu-ml-scala2.12
    description: Databricks GPU ML runtime version.
  single_user_name:
    default: ${workspace.current_user.userName}
    description: Databricks user or service principal for SINGLE_USER cluster access.

resources:
  jobs:
    document_kv_v1_benchmark:
      name: document-kv-v1-benchmark
      tasks:
        - task_key: document_kv_v1_benchmark
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            driver_node_type_id: ${var.node_type_id}
            data_security_mode: SINGLE_USER
            single_user_name: ${var.single_user_name}
            num_workers: 0
            spark_conf:
              spark.master: local[*]
              spark.databricks.cluster.profile: singleNode
            custom_tags:
              ResourceClass: SingleNode
              purpose: document-kv-v1-benchmark
            spark_env_vars:
              DOCUMENT_KV_VLLM_NATIVE_PROBE_FACTORY: ${var.vllm_native_probe_delegate_factory}
              DOCUMENT_KV_SGLANG_NATIVE_PROBE_FACTORY: ${var.sglang_native_probe_delegate_factory}
            aws_attributes:
              availability: ON_DEMAND
              zone_id: auto
          spark_python_task:
            python_file: ${var.runner_python_file}
            parameters:
              - --plan-json
              - ${var.plan_json_uri}
              - --result-json
              - ${var.execution_result_json_uri}
              - --package-wheel-uri
              - ${var.wheel_uri}
