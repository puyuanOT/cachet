name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install poetry==2.4.1

      - name: Check package metadata
        run: poetry check

      - name: Check Poetry lockfile
        run: poetry check --lock

      - name: Resolve base dependency set
        run: poetry install --dry-run

      - name: Resolve optional dependency set
        run: poetry install --dry-run --extras databricks --extras test

      - name: Install package with test extras
        run: poetry install -E test

      - name: Verify console script entry points
        run: |
          poetry run python - <<'PY'
          import shutil
          import subprocess
          import tomllib
          from pathlib import Path

          scripts = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["scripts"]
          for script_name in sorted(scripts):
              script_path = shutil.which(script_name)
              if script_path is None:
                  raise SystemExit(f"Console script {script_name!r} is not installed")
              subprocess.run(
                  [script_path, "--help"],
                  check=True,
                  stdout=subprocess.DEVNULL,
                  stderr=subprocess.STDOUT,
              )
          PY

      - name: Run tests
        run: poetry run pytest -q

      - name: Verify PEP 517 wheel build
        run: |
          python -m venv /tmp/cachet-pep517-wheel
          /tmp/cachet-pep517-wheel/bin/python -m pip install --upgrade pip
          /tmp/cachet-pep517-wheel/bin/python -m pip wheel . --no-deps -w /tmp/cachet-pep517-wheelhouse
          /tmp/cachet-pep517-wheel/bin/python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          def read_dist_info(archive, filename):
              roots = {
                  name.split("/", 1)[0]
                  for name in archive.namelist()
                  if ".dist-info/" in name
              }
              assert len(roots) == 1
              return archive.read(f"{roots.pop()}/{filename}").decode("utf-8")

          wheel = next(Path("/tmp/cachet-pep517-wheelhouse").glob("cachet_kv-*.whl"))
          assert wheel.name.endswith("-py3-none-any.whl")
          with ZipFile(wheel) as archive:
              metadata = read_dist_info(archive, "METADATA")
              wheel_metadata = read_dist_info(archive, "WHEEL")
              entry_points = read_dist_info(archive, "entry_points.txt")

          assert "Requires-Python: >=3.11,<4.0" in metadata
          assert "Requires-Dist: packaging (==26.2)" in metadata
          assert "Provides-Extra: databricks" in metadata
          assert "Project-URL: Repository, https://github.com/puyuanOT/cachet" in metadata
          assert "Tag: py3-none-any" in wheel_metadata
          assert "cachet-benchmark-plan=cachet.benchmark_plan:main" in entry_points
          PY

      - name: Build package
        run: poetry build

      - name: Verify built wheel metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          def read_dist_info(archive, filename):
              roots = {
                  name.split("/", 1)[0]
                  for name in archive.namelist()
                  if ".dist-info/" in name
              }
              assert len(roots) == 1
              return archive.read(f"{roots.pop()}/{filename}").decode("utf-8")

          wheel = next(Path("dist").glob("cachet_kv-*.whl"))
          assert wheel.name.endswith("-py3-none-any.whl")
          with ZipFile(wheel) as archive:
              metadata = read_dist_info(archive, "METADATA")
              wheel_metadata = read_dist_info(archive, "WHEEL")
              entry_points = read_dist_info(archive, "entry_points.txt")

          assert "Requires-Python: >=3.11,<4.0" in metadata
          assert "Requires-Dist: packaging (==26.2)" in metadata
          assert "Provides-Extra: test" in metadata
          assert "Project-URL: Issues, https://github.com/puyuanOT/cachet/issues" in metadata
          assert "Tag: py3-none-any" in wheel_metadata
          assert "cachet-pr-evidence=cachet.pr_evidence:main" in entry_points
          PY

      - name: Verify built wheel import smoke
        run: |
          python -m venv /tmp/cachet-wheel-smoke
          /tmp/cachet-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/cachet-wheel-smoke/bin/python -m pip install dist/cachet_kv-*.whl
          /tmp/cachet-wheel-smoke/bin/python - <<'PY'
          import cachet
          import document_kv_cache
          import restaurant_kv_serving

          assert cachet.__all__ == document_kv_cache.__all__
          assert cachet.CacheTier is document_kv_cache.CacheTier
          assert cachet.DocumentKVRequest is document_kv_cache.DocumentKVRequest
          assert restaurant_kv_serving.DocumentKVRequest is document_kv_cache.DocumentKVRequest
          assert not hasattr(cachet, "RestaurantKVRequest")
          assert cachet.storage is document_kv_cache.storage
          PY
          /tmp/cachet-wheel-smoke/bin/cachet-pr-evidence --help >/dev/null
