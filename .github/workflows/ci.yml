name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: python -m pip install poetry==2.2.1

      - name: Check package metadata
        run: poetry check

      - name: Resolve base dependency set
        run: poetry install --dry-run

      - name: Resolve optional dependency set
        run: poetry install --dry-run --extras databricks --extras test

      - name: Install package with test extras
        run: poetry install -E test

      - name: Run tests
        run: poetry run pytest -q

      - name: Build package
        run: poetry build
